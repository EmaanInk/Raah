{% extends "base.html" %}
{% block title %}Raah — Step 1{% endblock %}

{% block content %}
<main class="landing">
  <section class="hero-card">
    <span class="brand-pill">Step 1 of 12</span>

    <img
      src="{{ url_for('static', filename='images/Riruru_thinking.svg') }}"
      alt="Riruru thinking"
      class="riruru"
    />

    <h1>What should Raah call you?</h1>
    <p class="subtitle">Pick the name you like. This is your space.</p>
    {% if error %}
  <p class="small-note error-text">{{ error }}</p>
{% endif %}

<form method="POST" action="/onboarding/step-1">
  <div class="form-stack">
    <input
      type="text"
      name="name"
      class="form-control"
      placeholder="Your good name"
      required
    />
    <button class="btn-primary" type="submit">Continue</button>
  </div>
</form>
    
    <p class="small-note">No pressure. Just one step at a time.</p>
  </section>
</main>
{% endblock %}
