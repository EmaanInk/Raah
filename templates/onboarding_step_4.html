{% extends "base.html" %}
{% block title %}Raah — Step 4{% endblock %}

{% block content %}
<main class="landing">
  <section class="hero-card">
    <span class="brand-pill">Step 4 of 12</span>

    <img
      src="{{ url_for('static', filename='images/Riruru_thinking.svg') }}"
      alt="Riruru thinking"
      class="riruru"
    />

    <h1>How much time do you have to reach your goal?</h1>
    <p class="subtitle">This helps Raah set realistic weekly intensity.</p>

    {% if error %}
      <p class="small-note error-text">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/onboarding/step-4">
      <div class="form-stack">
        <select name="time_horizon" class="form-control" required>
          <option value="">Select one</option>
          <option value="1-2-months">1–2 months</option>
          <option value="3-6-months">3–6 months</option>
          <option value="6-12-months">6–12 months</option>
          <option value="12-plus-months">12+ months</option>
          <option value="not-sure">Not sure yet</option>
        </select>

        <button class="btn-primary" type="submit">Continue</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
