{% extends "base.html" %}
{% block title %}Restore Progress — Raah{% endblock %}

{% block content %}
<main class="landing">
  <div class="hero-card" style="max-width:560px; border-radius:28px;">

    <img src="{{ url_for('static', filename='images/Riruru_happy.svg') }}"
         class="riruru" alt="Riruru" style="width:120px;"/>

    <h1 style="font-size:28px; margin-bottom:8px;">Restore Your Progress</h1>
    <p class="subtitle" style="font-size:15px; margin-bottom:20px;">
      Paste your save code below to pick up exactly where you left off.
    </p>

    {% if error %}
    <p class="error-text" style="margin-bottom:12px;">{{ error }}</p>
    {% endif %}

    <form method="POST" class="form-stack">
      <textarea
        name="code"
        placeholder="Paste your save code here..."
        style="
          width:min(420px,100%);
          height:120px;
          padding:12px 14px;
          border:1px solid #d8ba9e;
          border-radius:13px;
          background:#fff;
          color:#3a2a1f;
          font-family:monospace;
          font-size:12px;
          resize:vertical;
          outline:none;
        "
      ></textarea>
      <button type="submit" class="btn-primary">Restore Progress</button>
    </form>

    <br>
    <a href="{{ url_for('index') }}" class="btn-outline">Start Fresh Instead</a>

  </div>
</main>
{% endblock %}
