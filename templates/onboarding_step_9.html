{% extends "base.html" %}
{% block title %}Raah — Step 9{% endblock %}

{% block content %}
<main class="landing">
  <section class="hero-card">
    <span class="brand-pill">Step 9 of 12</span>

    <img
      src="{{ url_for('static', filename='images/Riruru_thinking.svg') }}"
      alt="Riruru thinking"
      class="riruru"
    />

    <h1>What's your biggest fear about this journey?</h1>
    <p class="subtitle">This is your safe space.</p>

    {% if error %}
      <p class="small-note error-text">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/onboarding/step-9">
      <div class="form-stack">
        <select name="biggest_fear" class="form-control" required>
          <option value="">Select one</option>
          <option value="wasting-time">Wasting time on the wrong thing</option>
          <option value="losing-motivation">Losing motivation halfway</option>
          <option value="not-good">Not being good enough</option>
          <option value="university-load">Falling behind because of university</option>
          <option value="other">What others think</option>
        </select>

        <button class="btn-primary" type="submit">Continue</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
