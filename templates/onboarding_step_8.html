{% extends "base.html" %}
{% block title %}Raah — Step 8{% endblock %}

{% block content %}
<main class="landing">
  <section class="hero-card">
    <span class="brand-pill">Step 8 of 12</span>

    <img
      src="{{ url_for('static', filename='images/Riruru_happy.svg') }}"
      alt="Riruru happy"
      class="riruru"
    />

    <h1>How do you learn best?</h1>
    <p class="subtitle">Your answer helps Raah generate your personalized roadmap.</p>

    {% if error %}
      <p class="small-note error-text">{{ error }}</p>
    {% endif %}

    <form method="POST" action="/onboarding/step-8">
      <div class="form-stack">
        <select name="learning_style" class="form-control" required>
          <option value="">Select one</option>
          <option value="reading">Reading — docs, articles, written guides</option>
          <option value="watching">Watching — videos first then practice</option>
          <option value="building">Building — just give me a project</option>
          <option value="mixed">Mixed — a bit of everything</option>
        </select>

        <button class="btn-primary" type="submit">Continue</button>
      </div>
    </form>
  </section>
</main>
{% endblock %}
